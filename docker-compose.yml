services:
  mongo:
    image: mongo:4.4
    container_name: mongo
    ports:
      - "27017:27017"  # Exposes MongoDB on localhost:27017
    volumes:
      - mongo_data:/data/db  # Persistent storage for MongoDB
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - app-network


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PATH=$PATH:/go/bin
      - GOROOT=/usr/local/go
      - GOPATH=/go
      - PYTHONUNBUFFERED=1
      - MONGO_URI=mongodb://mongo:27017  # MongoDB URI for the backend to connect
      - DATABASE_NAME=typesdb  # Name of the MongoDB database
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - data:/app/data
      - ./nuclei-templates:/app/nuclei-templates
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - mongo  # Ensure MongoDB starts before the backend
    networks:
      - app-network

  agent-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PATH=$PATH:/go/bin
      - GOROOT=/usr/local/go
      - GOPATH=/go
      - PYTHONUNBUFFERED=1
      - MONGO_URI=mongodb://mongo:27017
      - DATABASE_NAME=typesdb
      - TASK_WORKER_NAME=agent-worker
      - V2_TASK_WORKER_POLL_INTERVAL=3
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - data:/app/data
      - ./nuclei-templates:/app/nuclei-templates
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: python -m app.worker_main
    depends_on:
      - mongo
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - "PORT=3001"
      - "VITE_API_BASE_URL=/api"
      - "VITE_ENABLE_SCAN_WEBSOCKET=false"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command: sh -lc "npm install --legacy-peer-deps && npm run build && serve -s dist -l 3001"
    stdin_open: true
    tty: true
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: type-s-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

volumes:
  data:
  mongo_data:  # Persistent storage for MongoDB

networks:
  app-network:
    driver: bridge
